name: Bug report
description: Something in Anis isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Anis. Please fill in the details below so we can
        reproduce the problem quickly. For security issues, do **not** file here —
        see [SECURITY.md](https://github.com/Adamax-AI/anis-releases/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: When I press the hotkey to record, …
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Anis
        2. Press …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Anis version
      description: Find it in Settings → About.
      placeholder: e.g. 0.1.2-beta.7
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Other (describe below)
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, screen recordings, or logs that might help.
    validations:
      required: false
